name: Read the Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "README.md"
      - "pyproject.toml"
      - "uv.lock"
      - ".readthedocs.yaml"
      - ".github/workflows/readthedocs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "README.md"
      - "pyproject.toml"
      - "uv.lock"
      - ".readthedocs.yaml"
      - ".github/workflows/readthedocs.yml"

permissions:
  contents: read

jobs:
  sphinx:
    name: Build Sphinx docs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Build documentation
        run: sphinx-build -b html docs/source docs/_build/html

  trigger-rtd:
    name: Trigger Read the Docs build
    runs-on: ubuntu-latest
    needs: sphinx
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger RTD webhook
        env:
          RTD_WEBHOOK_URL: ${{ secrets.RTD_WEBHOOK_URL }}
          RTD_WEBHOOK_TOKEN: ${{ secrets.RTD_WEBHOOK_TOKEN }}
        run: |
          if [ -z "$RTD_WEBHOOK_URL" ] || [ -z "$RTD_WEBHOOK_TOKEN" ]; then
            echo "RTD_WEBHOOK_URL and RTD_WEBHOOK_TOKEN secrets must be set."
            exit 1
          fi

          curl --fail --show-error --silent \
            --request POST \
            --data-urlencode "token=$RTD_WEBHOOK_TOKEN" \
            "$RTD_WEBHOOK_URL"
